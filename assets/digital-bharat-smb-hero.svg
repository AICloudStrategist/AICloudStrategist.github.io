<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Indian small business digital growth illustration</title>
  <desc id="desc">A shop, factory, clinic and digital dashboard connected with WhatsApp, website, automation, compliance and growth tracking icons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#ecfeff"/><stop offset="0.55" stop-color="#eef6ff"/><stop offset="1" stop-color="#fff7e6"/></linearGradient>
    <linearGradient id="brand" x1="0" x2="1"><stop offset="0" stop-color="#20d6bc"/><stop offset="1" stop-color="#3157d5"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#071827" flood-opacity=".15"/></filter>
  </defs>
  <rect width="960" height="720" rx="42" fill="url(#bg)"/>
  <circle cx="802" cy="92" r="86" fill="#20d6bc" opacity=".14"/>
  <circle cx="126" cy="606" r="108" fill="#3157d5" opacity=".10"/>
