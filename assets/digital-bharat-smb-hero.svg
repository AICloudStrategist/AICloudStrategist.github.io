    <rect x="28" y="174" width="220" height="46" rx="13" fill="#fff" stroke="#dbe7ef"/><circle cx="54" cy="197" r="12" fill="#3157d5"/><text x="76" y="203" font-family="Arial" font-size="16" fill="#172033">Call back due</text>
    <rect x="28" y="236" width="220" height="46" rx="13" fill="#fff" stroke="#dbe7ef"/><circle cx="54" cy="259" r="12" fill="#f4b63f"/><text x="76" y="265" font-family="Arial" font-size="16" fill="#172033">Quote follow-up</text>
    <rect x="28" y="312" width="100" height="56" rx="14" fill="#071827"/><text x="50" y="347" font-family="Arial" font-size="18" font-weight="800" fill="#fff">27</text><text x="32" y="365" font-family="Arial" font-size="11" fill="#c7f8ee">enquiries</text>
